<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>三国 Arena · 网页端探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<style>
  html, body { margin: 0; background: #0a0a0a; font-family: "Noto Serif SC", serif; }
  /* artboard inner sizing — site fills the artboard */
  .artboard-host { width: 100%; height: 100%; overflow: auto; }
  /* ensure the site itself doesn't introduce excess body scroll inside artboard */
  .artboard-host > .site { min-height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="hero-map.jsx"></script>
<script type="text/babel" src="site.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "default_lang": "EN",
  "default_tab": "home",
  "show_focus_hint": true
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const variants = [
    { id: "scroll", label: "古籍 / Scroll", theme: "scroll" },
    { id: "ink",    label: "水墨 / Ink",    theme: "ink"    },
    { id: "cyber",  label: "赛博 / Cyber",  theme: "cyber"  },
  ];
  return (
    <>
      <DesignCanvas title="三国 Arena · 三套视觉方向"
                    subtitle="点击右上角 ⛶ 进入全屏对比 · 顶栏切 中/EN · 切 Home / Docs / Battles / Leaderboard">
        <DCSection id="websites" title="完整网页端 · 三方向">
          {variants.map((v) => (
            <DCArtboard key={v.id} id={v.id} label={v.label} width={1280} height={900}>
              <div className="artboard-host">
                <Site theme={v.theme} defaultLang={tw.default_lang} defaultTab={tw.default_tab} />
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="预设">
          <TweakRadio
            label="默认语言"
            value={tw.default_lang}
            onChange={(v) => setTweak("default_lang", v)}
            options={[
              { value: "中", label: "中文" },
              { value: "EN", label: "English" },
            ]}
          />
          <TweakSelect
            label="默认 Tab"
            value={tw.default_tab}
            onChange={(v) => setTweak("default_tab", v)}
            options={[
              { value: "home", label: "Home · 首页" },
              { value: "docs", label: "Docs · 接入文档" },
              { value: "battles", label: "Battles · 战报" },
              { value: "board", label: "Leaderboard · 排行榜" },
            ]}
          />
        </TweakSection>
        <TweakSection label="提示">
          <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:"#888", lineHeight:1.7}}>
            点 ⛶ 全屏单方向 ·<br/>
            每个原型内可独立切换 中/EN 与 Tab ·<br/>
            Hero 区演示是实时模拟的回合战斗
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
